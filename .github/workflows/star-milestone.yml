name: LGPD Sentinel — Star Milestone Tweet

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

jobs:
  check-milestone:
    runs-on: ubuntu-latest
    steps:
      - name: Check stars and tweet on milestone
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TWITTER_API_KEY:        ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:     ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:   ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET:  ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, urllib.error, hmac, hashlib, time, base64, re
          from urllib.parse import quote

          # ── Fetch current star count ─────────────────────────────────────
          req = urllib.request.Request(
              "https://api.github.com/repos/ldsjunior-ui/lgpd-sentinel-ai",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "User-Agent": "lgpd-sentinel-bot"
              }
          )
          with urllib.request.urlopen(req, timeout=15) as r:
              repo = json.loads(r.read())
          stars = repo["stargazers_count"]
          print(f"Current stars: {stars}")

          MILESTONES = [10, 25, 50, 100, 250, 500, 1000]
          hit = next((m for m in MILESTONES if stars >= m), None)
          if not hit:
              print("No milestone reached yet.")
              raise SystemExit(0)

          # ── Check last tweeted milestone (via gist or env) ───────────────
          # Use GitHub Actions cache key as poor-man's state:
          # We write milestone to a file and cache it between runs.
          # If the file already records this milestone, skip.
          import pathlib
          state_file = pathlib.Path("/tmp/last_milestone.txt")
          last = int(state_file.read_text().strip()) if state_file.exists() else 0
          if hit <= last:
              print(f"Milestone {hit} already tweeted (last={last}). Skipping.")
              raise SystemExit(0)

          # ── Build tweet ──────────────────────────────────────────────────
          msgs = {
              10:   f"🎯 10 estrelas no LGPD Sentinel AI! Obrigado pela confiança.\n\nA ferramenta open source de auditoria LGPD com IA local continua crescendo. 🚀\n\n👉 https://github.com/ldsjunior-ui/lgpd-sentinel-ai\n\n#LGPD #OpenSource #IA #Privacidade",
              25:   f"⭐ 25 estrelas! A comunidade LGPD open source está crescendo.\n\nSe você ainda não testou o LGPD Sentinel AI, agora é a hora.\n\n🔗 https://ldsjunior-ui.github.io/lgpd-sentinel-landing/\n\n#LGPD #Compliance #DPO #Brasil",
              50:   f"🏆 50 estrelas no GitHub! Um marco importante para o LGPD Sentinel AI.\n\nAuditoria LGPD com IA 100% local, sem enviar dados para a nuvem. Grátis. Open source.\n\n🔗 https://github.com/ldsjunior-ui/lgpd-sentinel-ai\n\n#LGPD #OpenSource #IA",
              100:  f"🚀 100 ESTRELAS! O LGPD Sentinel AI atingiu 3 dígitos!\n\nDe 0 a 100 estrelassem gastar um real. IA local + FastAPI + Streamlit + SQLite.\n\nObrigado a todos que acreditaram! 🙏\n\n#LGPD #OpenSource #100stars",
              250:  f"💫 250 estrelas no LGPD Sentinel AI!\n\nA ferramenta mais completa de auditoria LGPD open source do Brasil está decolando.\n\n🔗 https://github.com/ldsjunior-ui/lgpd-sentinel-ai\n\n#LGPD #Brasil #OpenSource",
              500:  f"🔥 500 ESTRELAS! LGPD Sentinel AI is going places!\n\nOpen source LGPD audit tool with local AI — now at 500 stars.\n\n🌍 https://github.com/ldsjunior-ui/lgpd-sentinel-ai\n\n#LGPD #OpenSource #PrivacyTech",
              1000: f"🎊 1000 ESTRELAS! Um sonho que virou realidade.\n\nO LGPD Sentinel AI chegou a 1000 ⭐ no GitHub!\n\nObrigado a cada um que contribuiu, testou e compartilhou. 💚\n\n#LGPD #OpenSource #1kstars #Brasil",
          }
          tweet = msgs.get(hit, f"🌟 {hit} estrelas no LGPD Sentinel AI! https://github.com/ldsjunior-ui/lgpd-sentinel-ai #LGPD #OpenSource")

          # ── Post tweet via Twitter API v2 ────────────────────────────────
          AK  = os.environ.get("TWITTER_API_KEY")
          AS_ = os.environ.get("TWITTER_API_SECRET")
          AT  = os.environ.get("TWITTER_ACCESS_TOKEN")
          ATS = os.environ.get("TWITTER_ACCESS_SECRET")

          if not all([AK, AS_, AT, ATS]):
              print("Twitter secrets not configured — skipping tweet.")
              raise SystemExit(0)

          def oauth1_header(method, url, params, ak, aks, at, ats):
              ts = str(int(time.time()))
              nonce = base64.b64encode(os.urandom(16)).decode().rstrip("=")
              oauth = {
                  "oauth_consumer_key": ak,
                  "oauth_nonce": nonce,
                  "oauth_signature_method": "HMAC-SHA1",
                  "oauth_timestamp": ts,
                  "oauth_token": at,
                  "oauth_version": "1.0",
              }
              all_params = {**params, **oauth}
              sorted_params = "&".join(f"{quote(k,'')  }={quote(str(v),'')}" for k, v in sorted(all_params.items()))
              base = f"{method}&{quote(url,'')}&{quote(sorted_params,'')}"
              key = f"{quote(aks,'')}&{quote(ats,'')}"
              sig = base64.b64encode(hmac.new(key.encode(), base.encode(), hashlib.sha1).digest()).decode()
              oauth["oauth_signature"] = sig
              header = "OAuth " + ", ".join(f'{quote(k,"")}="{quote(str(v),"")}"' for k, v in sorted(oauth.items()))
              return header

          url = "https://api.twitter.com/2/tweets"
          payload = json.dumps({"text": tweet}).encode()
          auth = oauth1_header("POST", url, {}, AK, AS_, AT, ATS)
          req2 = urllib.request.Request(url, data=payload, headers={
              "Authorization": auth,
              "Content-Type": "application/json",
          }, method="POST")
          try:
              with urllib.request.urlopen(req2, timeout=20) as r:
                  resp = json.loads(r.read())
                  print(f"✅ Tweet posted: {resp['data']['id']}")
                  state_file.write_text(str(hit))
          except urllib.error.HTTPError as e:
              print(f"Twitter error {e.code}: {e.read().decode()}")
          PYEOF
